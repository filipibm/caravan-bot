# Drop this file in /etc/nginx/sites-available/caravan-bot
# then: ln -s /etc/nginx/sites-available/caravan-bot /etc/nginx/sites-enabled/
# and:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;   # <-- replace

    root /opt/caravan-bot/frontend/html;
    index index.html;

    # Proxy API calls to the FastAPI backend container
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
